name: Scrape & Publish M3U8

on:
  schedule:
    # Runs every hour at :00
    - cron: "0 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write # needed to push the generated .m3u8 files

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python (pip cache built-in) ────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      # ── 4. Playwright — cache the browser binaries ─────────────────────────
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pyproject.toml') }}

      - name: Install Playwright Chromium
        # Only re-download when pyproject.toml changes (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Chromium system deps (cache hit)
        # Binaries are cached but system libs still need installing
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      # ── 5. Launch Chromium via CDP ─────────────────────────────────────────
      - name: Start Chromium CDP on port 9222
        run: |
          ~/.cache/ms-playwright/chromium-*/chrome-linux/chrome \
            --remote-debugging-port=9222 \
            --no-sandbox \
            --headless=new \
            --disable-gpu \
            --disable-dev-shm-usage \
            &
          sleep 2

      # ── 6. Run scraper ─────────────────────────────────────────────────────
      - name: Run fetch.py
        run: python fetch.py

      # ── 7. Commit & push generated files ──────────────────────────────────
      - name: Commit M3U8 output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.m3u8 caches/
          git diff --cached --quiet || git commit -m "chore: update M3U8 [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
