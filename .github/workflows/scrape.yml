name: Scrape & Publish M3U8

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pyproject.toml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Chromium system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Start Chromium CDP on port 9222
        run: |
          CHROME=$(find ~/.cache/ms-playwright -name 'chrome' -type f | head -1)
          echo "Using chrome: $CHROME"
          "$CHROME" \
            --remote-debugging-port=9222 \
            --no-sandbox \
            --headless=new \
            --disable-gpu \
            --disable-dev-shm-usage \
            &
          # Wait until CDP is actually accepting connections
          for i in $(seq 1 10); do
            curl -sf http://localhost:9222/json/version && break
            echo "Waiting for CDP... ($i)"
            sleep 1
          done

      - name: Run fetch.py
        run: python fetch.py

      - name: Commit M3U8 output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.m3u8 caches/
          git diff --cached --quiet || git commit -m "chore: update M3U8 [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
